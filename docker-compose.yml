# ================================================================
# AIMScribe Backend - Docker Compose (Full Stack)
# ================================================================
# Runs ALL services: PostgreSQL, Redis, MinIO, API Server, Worker
# ================================================================
# Usage:
#   docker-compose up -d              (Start all services)
#   docker-compose up -d --build      (Rebuild and start)
#   docker-compose down               (Stop all services)
#   docker-compose logs -f api worker (View API & Worker logs)
#   docker-compose logs -f            (View all logs)
# ================================================================

services:
  # ================================================================
  # PostgreSQL Database
  # ================================================================
  postgres:
    image: postgres:14
    container_name: aimscribe-postgres
    environment:
      POSTGRES_DB: aimscribe_db
      POSTGRES_USER: aimscribe_user
      POSTGRES_PASSWORD: aimscribe123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_database.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U aimscribe_user -d aimscribe_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ================================================================
  # Redis (Job Queue & Caching)
  # ================================================================
  redis:
    image: redis:7-alpine
    container_name: aimscribe-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ================================================================
  # MinIO (Object Storage for Audio Files)
  # ================================================================
  minio:
    image: minio/minio
    container_name: aimscribe-minio
    environment:
      MINIO_ROOT_USER: aimscribe
      MINIO_ROOT_PASSWORD: aimscribe123
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # ================================================================
  # MinIO Setup (Creates bucket on first run)
  # ================================================================
  minio-setup:
    image: minio/mc
    container_name: aimscribe-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set aimscribe http://minio:9000 aimscribe aimscribe123;
      mc mb --ignore-existing aimscribe/aimscribe-audio;
      mc anonymous set download aimscribe/aimscribe-audio;
      echo 'Bucket created successfully';
      exit 0;
      "

  # ================================================================
  # API Server (FastAPI)
  # ================================================================
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: aimscribe-api
    ports:
      - "6000:6000"
    environment:
      # Azure OpenAI - Transcription
      AZURE_TRANSCRIBE_ENDPOINT: ${AZURE_TRANSCRIBE_ENDPOINT}
      AZURE_TRANSCRIBE_API_KEY: ${AZURE_TRANSCRIBE_API_KEY}
      AZURE_TRANSCRIBE_DEPLOYMENT: ${AZURE_TRANSCRIBE_DEPLOYMENT:-gpt-4o-transcribe-diarize}
      AZURE_TRANSCRIBE_API_VERSION: ${AZURE_TRANSCRIBE_API_VERSION:-2025-03-01-preview}
      # Azure OpenAI - NER
      AZURE_NER_ENDPOINT: ${AZURE_NER_ENDPOINT}
      AZURE_NER_API_KEY: ${AZURE_NER_API_KEY}
      AZURE_NER_DEPLOYMENT: ${AZURE_NER_DEPLOYMENT:-gpt-5.2-chat}
      AZURE_API_VERSION: ${AZURE_API_VERSION:-2025-01-01-preview}
      # PostgreSQL (container hostname)
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: aimscribe_db
      POSTGRES_USER: aimscribe_user
      POSTGRES_PASSWORD: aimscribe123
      POSTGRES_POOL_MIN: 5
      POSTGRES_POOL_MAX: 20
      # Redis (container hostname)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      # MinIO (container hostname)
      MINIO_ENDPOINT: minio:9000
      MINIO_EXTERNAL_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: aimscribe
      MINIO_SECRET_KEY: aimscribe123
      MINIO_BUCKET: aimscribe-audio
      MINIO_SECURE: "false"
      # Server
      SERVER_PORT: 6000
      SERVER_HOST: 0.0.0.0
      LOG_LEVEL: INFO
      PROMPTS_DIR: /app/src/prompts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:6000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ================================================================
  # Worker (Async Transcription & NER Processing)
  # ================================================================
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: aimscribe-worker
    environment:
      # Azure OpenAI - Transcription
      AZURE_TRANSCRIBE_ENDPOINT: ${AZURE_TRANSCRIBE_ENDPOINT}
      AZURE_TRANSCRIBE_API_KEY: ${AZURE_TRANSCRIBE_API_KEY}
      AZURE_TRANSCRIBE_DEPLOYMENT: ${AZURE_TRANSCRIBE_DEPLOYMENT:-gpt-4o-transcribe-diarize}
      AZURE_TRANSCRIBE_API_VERSION: ${AZURE_TRANSCRIBE_API_VERSION:-2025-03-01-preview}
      # Azure OpenAI - NER
      AZURE_NER_ENDPOINT: ${AZURE_NER_ENDPOINT}
      AZURE_NER_API_KEY: ${AZURE_NER_API_KEY}
      AZURE_NER_DEPLOYMENT: ${AZURE_NER_DEPLOYMENT:-gpt-5.2-chat}
      AZURE_API_VERSION: ${AZURE_API_VERSION:-2025-01-01-preview}
      # PostgreSQL (container hostname)
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: aimscribe_db
      POSTGRES_USER: aimscribe_user
      POSTGRES_PASSWORD: aimscribe123
      POSTGRES_POOL_MIN: 5
      POSTGRES_POOL_MAX: 20
      # Redis (container hostname)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      # MinIO (container hostname)
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: aimscribe
      MINIO_SECRET_KEY: aimscribe123
      MINIO_BUCKET: aimscribe-audio
      MINIO_SECURE: "false"
      # Worker Config
      LOG_LEVEL: INFO
      PROMPTS_DIR: /app/src/prompts
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-10}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  default:
    name: aimscribe-network
